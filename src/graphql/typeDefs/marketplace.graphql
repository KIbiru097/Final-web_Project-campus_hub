type Product {
  id: ID!
  seller: User!
  title: String!
  description: String
  price: Float!
  condition: String!
  status: String!
  images: [String!]
  createdAt: String!
}

type ProductCategory {
  id: ID!
  name: String!
  description: String
}

type ProductOrder {
  id: ID!
  buyer: User!
  seller: User!
  totalAmount: Float!
  orderStatus: String!
  createdAt: String!
}

input CreateProductInput {
  title: String!
  description: String
  price: Float!
  categoryId: ID!
  condition: String!
}

extend type Query {
  products(limit: Int, offset: Int): [Product!]!
  product(id: ID!): Product
  myProducts: [Product!]!
  myOrders: [ProductOrder!]!
}

extend type Mutation {
  createProduct(input: CreateProductInput!): Product!
  updateProduct(id: ID!, title: String, description: String, price: Float): Product!
  deleteProduct(id: ID!): Boolean!
  createOrder(productId: ID!, quantity: Int!, shippingAddress: String!): ProductOrder!
}
