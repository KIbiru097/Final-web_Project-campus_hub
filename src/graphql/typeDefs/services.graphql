type Service {
  id: ID!
  provider: User!
  title: String!
  description: String!
  price: Float!
  category: String!
  rating: Float
  createdAt: String!
}

type ServiceBooking {
  id: ID!
  service: Service!
  customer: User!
  bookingDate: String!
  status: String!
  totalAmount: Float!
}

extend type Query {
  services(category: String, search: String, limit: Int): [Service!]!
  service(id: ID!): Service
  myServices: [Service!]!
}

extend type Mutation {
  createService(title: String!, description: String!, price: Float!, category: String!): Service!
  bookService(serviceId: ID!, bookingDate: String!): ServiceBooking!
}
