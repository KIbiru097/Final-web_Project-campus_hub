type Conversation {
  id: ID!
  participants: [User!]!
  lastMessage: Message
  createdAt: String!
}

type Message {
  id: ID!
  sender: User!
  content: String!
  isRead: Boolean!
  createdAt: String!
}

extend type Query {
  myConversations: [Conversation!]!
  conversation(id: ID!): Conversation
}

extend type Mutation {
  sendMessage(conversationId: ID!, content: String!): Message!
  createConversation(participantIds: [ID!]!): Conversation!
}
