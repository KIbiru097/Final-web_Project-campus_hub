type Delivery {
  id: ID!
  deliveryPerson: User!
  orderType: String!
  orderId: ID!
  pickupLocation: String!
  deliveryLocation: String!
  deliveryStatus: String!
  createdAt: String!
}

enum DeliveryStatus {
  PENDING
  ASSIGNED
  PICKED_UP
  DELIVERED
  CANCELLED
}

extend type Query {
  myDeliveries: [Delivery!]!
  delivery(id: ID!): Delivery
}

extend type Mutation {
  updateDeliveryStatus(deliveryId: ID!, status: String!): Delivery!
}
