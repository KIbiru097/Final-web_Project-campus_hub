type Cafe {
  id: ID!
  name: String!
  description: String
  location: String!
  rating: Float
}

type MenuItem {
  id: ID!
  cafe: Cafe!
  name: String!
  description: String
  price: Float!
}

type FoodOrder {
  id: ID!
  student: User!
  cafe: Cafe!
  totalAmount: Float!
  status: String!
  createdAt: String!
}

extend type Query {
  cafes: [Cafe!]!
  cafe(id: ID!): Cafe
  menuItems(cafeId: ID): [MenuItem!]!
  myFoodOrders: [FoodOrder!]!
}

extend type Mutation {
  placeFoodOrder(cafeId: ID!, items: [OrderItemInput!]!): FoodOrder!
}

input OrderItemInput {
  menuItemId: ID!
  quantity: Int!
}
