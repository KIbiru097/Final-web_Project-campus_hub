type User {
  id: ID!
  firstName: String!
  lastName: String!
  email: String!
  phone: String
  accountStatus: String!
  profilePictureUrl: String
  lastLogin: String
  createdAt: String!
  updatedAt: String!
}

type AuthPayload {
  token: String!
  user: User!
}

type UpdateUserResponse {
  success: Boolean!
  message: String!
  user: User
}

type ChangePasswordResponse {
  success: Boolean!
  message: String!
}

input RegisterInput {
  email: String!
  password: String!
  firstName: String!
  lastName: String!
  phone: String!
  university: String
  department: String
  role: String
}

input LoginInput {
  email: String!
  password: String!
}

input UpdateUserInput {
  firstName: String
  lastName: String
  phone: String
  profilePictureUrl: String
}

input ChangePasswordInput {
  currentPassword: String!
  newPassword: String!
}

type Query {
  me: User!
  getUser(id: ID!): User
  users: [User!]!
}

type Mutation {
  register(input: RegisterInput!): AuthPayload!
  login(input: LoginInput!): AuthPayload!
  updateUser(input: UpdateUserInput!): UpdateUserResponse!
  changePassword(input: ChangePasswordInput!): ChangePasswordResponse!
}