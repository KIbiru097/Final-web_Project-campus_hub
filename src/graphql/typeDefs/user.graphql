type User {
  id: ID!
  firstName: String!
  lastName: String!
  email: String!
  phone: String
  accountStatus: String!
  profilePictureUrl: String
  lastLogin: String
  createdAt: String!
  updatedAt: String!
}

type AuthPayload {
  token: String!
  user: User!
}

input RegisterInput {
  firstName: String!
  lastName: String!
  email: String!
  phone: String!
  password: String!
}

input LoginInput {
  email: String!
  password: String!
}

extend type Query {
  me: User!
  user(id: ID!): User
}

extend type Mutation {
  register(input: RegisterInput!): AuthPayload!
  login(input: LoginInput!): AuthPayload!
}
