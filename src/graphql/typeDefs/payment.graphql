type Payment {
  id: ID!
  payer: User!
  amount: Float!
  paymentMethod: String!
  paymentStatus: String!
  transactionReference: String
  paidAt: String
  createdAt: String!
}

enum PaymentMethod {
  CHAPA
  TELEBIRR
  CASH
  BANK_TRANSFER
}

enum PaymentStatus {
  PENDING
  PAID
  FAILED
  REFUNDED
}

input InitiatePaymentInput {
  orderType: String!
  orderId: ID!
  paymentMethod: PaymentMethod!
}

type PaymentPayload {
  payment: Payment!
  reference: String
}

extend type Query {
  myPayments(limit: Int): [Payment!]!
  payment(id: ID!): Payment
}

extend type Mutation {
  initiatePayment(input: InitiatePaymentInput!): PaymentPayload!
  verifyPayment(reference: String!): Payment!
}
